name: Sahayak AI — CI Pipeline

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: "ap-south-1"

jobs:
  security-scan:
    name: Security & SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bandit SAST (Python)
        run: |
          pip install bandit
          bandit -r services/ -ll -ii -f json -o bandit-report.json || true
          cat bandit-report.json

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Secret detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        service:
          - voice-service
          - conversation-orchestrator
          - scheme-retrieval-service
          - eligibility-engine
          - user-profile-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-cov moto[dynamodb,s3] boto3

      - name: Run unit tests
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=70 -m "not integration" || true

  build:
    name: Build Lambda Packages
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build all service packages
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          for service in voice-service conversation-orchestrator scheme-retrieval-service eligibility-engine user-profile-service scheme-management-service; do
            echo "Building $service..."
            if [ ! -d "services/$service" ]; then
              echo "WARNING: services/$service not found, skipping..."
              continue
            fi
            cd services/$service
            mkdir -p dist
            pip install -r requirements.txt -t dist/ -q
            cp -r src dist/ 2>/dev/null || true
            cd dist && zip -r "${GITHUB_WORKSPACE}/artifacts/${service}.zip" . -q
            cd "${GITHUB_WORKSPACE}"
            echo "$service built: $(du -sh artifacts/${service}.zip | cut -f1)"
          done

      - name: Upload lambda packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: artifacts/*.zip
          retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8 black isort

      - name: Flake8
        run: flake8 services/ --max-line-length=100 --ignore=E501,W503 || true

      - name: Black
        run: black --check services/ || true
